name: DVIDS B-Roll check

on:
  schedule:
    # Every 5 minutes (UTC). GitHub treats scheduled runs as best-effort and
    # delays/skips them under load, so we schedule aggressively to shrink the
    # gaps between the runs that actually fire. The watermark backfills any gap,
    # so nothing is ever missed regardless of cadence.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    # Lets you run it on demand from the Actions tab.
    inputs:
      seed_and_post:
        description: "Post existing results on this run (1 = yes). Normally leave blank."
        required: false
        default: ""

# Allow the job to commit the updated state.json back to the repo.
permissions:
  contents: write

# Never run two checks at once (would race on state.json).
concurrency:
  group: dvids-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs (not mutable tags) for supply-chain safety.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run checker
        env:
          DVIDS_API_KEY: ${{ secrets.DVIDS_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SEED_AND_POST: ${{ github.event.inputs.seed_and_post }}
        run: python dvids_check.py

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update DVIDS watcher state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
