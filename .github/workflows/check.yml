name: DVIDS B-Roll check

on:
  # Triggered externally by cron-job.org every 5 min via the workflow_dispatch
  # API — GitHub's own `schedule:` cron was removed 2026-07-01 because it only
  # fired every 60–90 min (best-effort throttling). To restore the built-in
  # backup, re-add:
  #   schedule:
  #     - cron: "*/5 * * * *"
  workflow_dispatch:
    # Lets you run it on demand from the Actions tab.
    inputs:
      seed_and_post:
        description: "Post existing results on this run (1 = yes). Normally leave blank."
        required: false
        default: ""

# Allow the job to commit the updated state.json back to the repo.
permissions:
  contents: write

# Never run two checks at once (would race on state.json).
concurrency:
  group: dvids-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs (not mutable tags) for supply-chain safety.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run checker
        env:
          DVIDS_API_KEY: ${{ secrets.DVIDS_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SEED_AND_POST: ${{ github.event.inputs.seed_and_post }}
        run: python dvids_check.py

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update DVIDS watcher state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
